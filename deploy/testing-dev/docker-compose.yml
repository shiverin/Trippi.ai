name: trippi-testing-dev

x-app-base: &app-base
  build:
    context: ../..
    dockerfile: deploy/testing-dev/Dockerfile
  working_dir: /workspace
  init: true
  volumes:
    - ../..:/workspace
    - node_modules:/workspace/node_modules
    - client_node_modules:/workspace/client/node_modules
    - server_node_modules:/workspace/server/node_modules
    - shared_node_modules:/workspace/shared/node_modules

services:
  server:
    <<: *app-base
    command: >
      sh -lc "
        test -d node_modules/.bin || npm ci &&
        npm run build --workspace=shared &&
        npm run dev --workspace=server
      "
    environment:
      NODE_ENV: development
      PORT: 3001
      HOST: 0.0.0.0
      LOG_LEVEL: info
      TZ: ${TZ:-Asia/Singapore}
      APP_URL: http://127.0.0.1:${TRIPPI_TESTING_DEV_CLIENT_PORT:-5180}
      ALLOWED_ORIGINS: http://127.0.0.1:${TRIPPI_TESTING_DEV_CLIENT_PORT:-5180},http://localhost:${TRIPPI_TESTING_DEV_CLIENT_PORT:-5180}
      COOKIE_SECURE: "false"
      FORCE_HTTPS: "false"
      TRIPPI_DB_PROVIDER: sqlite
      TRIPPI_DB_FILE: /workspace/server/data/testing-dev.db
      ENCRYPTION_KEY: ${TRIPPI_TESTING_DEV_ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      ADMIN_EMAIL: ${TRIPPI_TESTING_DEV_ADMIN_EMAIL:-testing-dev@trippi.local}
      ADMIN_PASSWORD: ${TRIPPI_TESTING_DEV_ADMIN_PASSWORD:-TestingDev12345!}
    ports:
      - "127.0.0.1:${TRIPPI_TESTING_DEV_API_PORT:-3005}:3001"
    volumes:
      - ../..:/workspace
      - node_modules:/workspace/node_modules
      - client_node_modules:/workspace/client/node_modules
      - server_node_modules:/workspace/server/node_modules
      - shared_node_modules:/workspace/shared/node_modules
      - server_data:/workspace/server/data
      - server_uploads:/workspace/server/uploads
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  client:
    <<: *app-base
    command: >
      sh -lc "
        test -d node_modules/.bin || npm ci &&
        npm run dev --workspace=client -- --host 0.0.0.0 --port 5173
      "
    environment:
      NODE_ENV: development
      TRIPPI_API_TARGET: http://server:3001
      VITE_TRIPPI_DISABLE_OVERLAYS: "true"
    ports:
      - "127.0.0.1:${TRIPPI_TESTING_DEV_CLIENT_PORT:-5180}:5173"
    depends_on:
      server:
        condition: service_healthy

volumes:
  node_modules:
  client_node_modules:
  server_node_modules:
  shared_node_modules:
  server_data:
  server_uploads:
