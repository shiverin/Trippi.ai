name: Deploy Wiki

on:
  push:
    branches: [main]
    paths:
      - "wiki/**"
      - ".github/workflows/wiki.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wiki-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check wiki repository exists
        id: wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git ls-remote "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::GitHub has not created ${GITHUB_REPOSITORY}.wiki.git yet. Create the first wiki page once, then rerun this workflow."
          fi

      - name: Publish to GitHub wiki
        if: steps.wiki.outputs.exists == 'true'
        uses: Andrew-Chen-Wang/github-wiki-action@v5
        with:
          strategy: clone
