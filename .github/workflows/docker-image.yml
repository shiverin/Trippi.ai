name: Docker Image

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - main
      - experiment/oracle-autonomous-db
    paths:
      - "client/**"
      - "server/**"
      - "shared/**"
      - "Dockerfile"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/docker-image.yml"
  workflow_dispatch:

concurrency:
  group: docker-image-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/trippi-ai

jobs:
  build:
    name: Build and publish image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
          labels: |
            org.opencontainers.image.title=Trippi
            org.opencontainers.image.description=Trippi production web and API image

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
